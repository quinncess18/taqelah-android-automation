name: Universal Mobile Automation (Android & iOS)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-test:
    name: Android Regression
    runs-on: ubuntu-22.04 # KVM enabled for high-speed emulators
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Start Appium Server
        run: npx appium --allow-insecure uiautomator2:adb_shell &

      - name: Run Android Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: CI=true DEVICE_COUNT=1 npm test

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-android
          path: playwright-report/
          retention-days: 30

