name: Universal Mobile Automation (Android & iOS)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-test:
    name: Android Regression
    runs-on: ubuntu-22.04 # CRITICAL: Bypasses the AppArmor bugs in ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Download Application Binary
        run: |
          mkdir -p apps
          curl -L "https://github.com/quinncess18/taqelah-mobile-automation/releases/download/v1.0.0/DemoApp-v1.0.0.apk" -o apps/DemoApp-v1.0.0.apk

      - name: Start Appium Server
        run: npx appium --allow-insecure adb_shell &
        env:
          APPIUM_HOME: ${{ github.workspace }}

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android Tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          APPIUM_HOME: ${{ github.workspace }}
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            adb install apps/DemoApp-v1.0.0.apk
            # Grant location perms to io.appium.settings — its ForegroundService
            # is declared with type=location and on API 34+ requires
            # ACCESS_*_LOCATION granted to start (else SecurityException → the
            # Appium instrumentation init fails). Grants survive the test run.
            adb shell pm grant io.appium.settings android.permission.ACCESS_FINE_LOCATION || true
            adb shell pm grant io.appium.settings android.permission.ACCESS_COARSE_LOCATION || true
            CI=true DEVICE_COUNT=1 DEVICE_0_UDID=emulator-5554 DEVICE_0_NAME="Pixel 8 (Local)" DEVICE_0_PLATFORM=android DEVICE_0_SYSTEM_PORT=8200 DEVICE_0_CHROMEDRIVER_PORT=9515 npm test

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-android
          path: playwright-report/
          retention-days: 30

      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-android
          path: test-results/
          retention-days: 30

