name: Universal Mobile Automation (Android & iOS)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android-test:
    name: Android Regression
    runs-on: ubuntu-22.04 # CRITICAL: Bypasses the AppArmor bugs in ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Start Appium Server
        run: npx appium --allow-insecure adb_shell &
        env:
          APPIUM_HOME: ${{ github.workspace }}

      - name: Enable KVM group perms
        # THE MISSING STEP: This enables hardware acceleration on GitHub Runners
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Tests in Cloud Emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          APPIUM_HOME: ${{ github.workspace }}
        with:
          api-level: 29          
          target: default        
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: CI=true DEVICE_COUNT=1 npm test

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-android
          path: playwright-report/
          retention-days: 30

